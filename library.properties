sentence=Code-first Alexa Smart Home for Particle devices: declare a device in ~5 lines and control it by voice.
paragraph=Automatica exposes a paged manifest, a compact control function, and coalesced state publishes (the automaticaManifest/automaticaCtl/automaticaState cloud surface) that a self-hosted Alexa Smart Home Lambda drives. The core logic is Device-OS-free so it is unit-tested on the host with Catch2.
